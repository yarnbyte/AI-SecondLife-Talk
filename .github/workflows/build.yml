name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 需要写权限才能创建 Release 并上传产物
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # macOS 需要额外安装两个交叉编译 target 才能构建 universal binary
      - name: Add macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AI SLtalk ${{ github.ref_name }}'
          releaseBody: |
            ## AI SLtalk ${{ github.ref_name }}

            ### 下载 / Download
            - **Windows**: 下载 `.msi` 或 `_x64-setup.exe` 安装包
            - **macOS**: 下载 `.dmg` 文件（Universal Binary，同时支持 Intel + Apple Silicon）

            > macOS 用户：首次打开如遇安全阻止，请在"系统设置 → 隐私与安全性"中点击"仍然打开"。
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
